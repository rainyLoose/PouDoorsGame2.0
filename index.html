<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PouDoorsGame 2.0</title>
  <style>
    body { font-family: sans-serif; background: #121219; color: #fff; text-align: center; margin: 0; padding: 15px; }
    .pantalla { display: none; }
    .pantalla.activa { display: block; }
    button { background: #6c5ce7; color: white; border: none; padding: 10px 18px; margin: 5px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    
    .barra-contenedor { width: 80%; max-width: 300px; background: #2a2a3d; height: 16px; margin: 5px auto 12px; border-radius: 8px; overflow: hidden; }
    .b-miedo { width: 0%; height: 100%; background: #9b59b6; }
    .b-humedad { width: 0%; height: 100%; background: #3498db; }
    .b-hambre { width: 100%; height: 100%; background: #e67e22; }
    .b-empapacho { width: 0%; height: 100%; background: #2ecc71; }

    /* Caja de Eventos (3 líneas) */
    .caja-eventos { background: #1e1e2f; border: 1px solid #444; border-radius: 8px; padding: 10px; width: 85%; max-width: 350px; margin: 15px auto; min-height: 60px; font-size: 0.85rem; text-align: left; }
    .panel-audio { background: #1e1e2f; padding: 15px; border-radius: 12px; display: inline-block; margin-top: 10px; }
  </style>
</head>
<body>

  <!-- BOTÓN PARA DESBLOQUEAR SONIDO -->
  <button id="btn-audio-init" onclick="reproducirMusica('raining_somewhere'); this.style.display='none';">▶️ Haz clic aquí para Iniciar Sonido/Juego</button>

  <!-- PANTALLA PRINCIPAL -->
  <div id="pantalla-juego" class="pantalla activa">
    <h1>PouDoorsGame 2.0</h1>
    <p>🪙 Monedas: <span id="monedas-txt">100</span></p>

    <!-- ESTADÍSTICAS -->
    <p>🍖 Hambre:</p>
    <div class="barra-contenedor"><div id="hambre-val" class="b-hambre"></div></div>
    
    <p>🤢 Empapacho:</p>
    <div class="barra-contenedor"><div id="empapacho-val" class="b-empapacho"></div></div>

    <p>😱 Miedo:</p>
    <div class="barra-contenedor"><div id="miedo-val" class="b-miedo"></div></div>
    
    <p>💧 Humedad:</p>
    <div class="barra-contenedor"><div id="humedad-val" class="b-humedad"></div></div>

    <!-- CAJA DE EVENTOS (3 LÍNEAS) -->
    <div id="eventos-box" class="caja-eventos">
      • Bienvenido a PouDoorsGame 2.0<br>
      • Usa los botones para explorar<br>
      • Cuida a Pou de la lluvia
    </div>

    <!-- NAVEGACIÓN -->
    <button onclick="cambiarPantalla('pantalla-tienda')">🛒 Tienda</button>
    <button onclick="cambiarPantalla('pantalla-cocina')">🍳 Cocina</button>
    <button onclick="cambiarPantalla('pantalla-trofeos')">🏆 Trofeos</button>
    <br>
    <button onclick="guardarPartida()">💾 Guardar (partida.pou)</button>
    <button onclick="cargarPartida()">📂 Cargar Partida</button>

    <!-- PANEL AUDIO -->
    <div class="panel-audio">
      <h3>🔊 Audio</h3>
      Música: <input type="range" id="vol-musica" min="0" max="1" step="0.1" value="0.8" oninput="cambiarVolumenMusica(this.value)"><br>
      SFX: <input type="range" id="vol-sfx" min="0" max="1" step="0.1" value="1" oninput="cambiarVolumenSFX(this.value)">
    </div>
  </div>

  <!-- TIENDA -->
  <div id="pantalla-tienda" class="pantalla">
    <button onclick="volverAlJuego()">← Volver</button>
    <h2>🛒 Tienda</h2>
    <button onclick="comprarItem('jugo_pina')">🧃 Jugo de Piña (12M)</button>
    <button onclick="comprarItem('burrito')">🌯 Burrito (20M)</button>
  </div>

  <!-- COCINA -->
  <div id="pantalla-cocina" class="pantalla">
    <button onclick="volverAlJuego()">← Volver</button>
    <h2>🍳 Cocina</h2>
    <p>Mezcla ingredientes para Pou</p>
  </div>

  <!-- TROFEOS -->
  <div id="pantalla-trofeos" class="pantalla">
    <button onclick="volverAlJuego()">← Volver</button>
    <h2>🏆 Trofeos</h2>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/gh/rainyLoose/PouDoorsGame2.0@javascript/audio.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/rainyLoose/PouDoorsGame2.0@javascript/items.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/rainyLoose/PouDoorsGame2.0@javascript/game.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/rainyLoose/PouDoorsGame2.0@javascript/ui.js"></script>
</body>
</html>
